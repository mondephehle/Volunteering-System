{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">All Logged Hours</h2>
<div class="card border-0 shadow-sm rounded-4">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table">
                <thead><tr><th>Student</th><th>Event</th><th>Hours</th><th>Submitted On</th></tr></thead>
                <tbody>
                {% for hour in hours %}
                    <tr>
                        <td>{{ hour.student_name }}</td>
                        <td>{{ hour.event.title }}</td>
                        <td>{{ hour.hours }}</td>
                        <td>{{ hour.submission_date.strftime('%d %b %Y %H:%M') }}</td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
